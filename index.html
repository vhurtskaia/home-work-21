<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Home Work 21</title>
</head>
<body>
  <h1>JavaScript Home work 21</h1>
  <hr>
  <h2>1. Counter</h2>
  <label>
    Початкове значення:
    <input type="number" id="counterStart">
  </label>
  <button id="setCounter">Встановити</button>
  <button id="nextCounter">Наступне значення</button>
  <p>Результат: <span id="counterResult"></span></p>
  <hr>
  <h2>2. CounterFactory</h2>
  <p>Поточне значення:
    <span id="factoryValue">0</span>
  </p>
  <button id="increment">+</button>
  <button id="decrement">-</button>
  <br><br>
  <label>
    Нове значення:
    <input type="number" id="factoryInput">
  </label>
  <button id="setFactory">Встановити</button>
  <hr>
  <h2>3. myPow()</h2>
  <label>
    Число:
    <input type="number" id="powA">
  </label>
  <br><br>
  <label>
    Степінь:
    <input type="number" id="powB">
  </label>
  <br><br>
  <button id="calculatePow">
    Обчислити
  </button>
  <p id="powResult"></p>
  <hr>
  <h2>4. myMax()</h2>
  <label>
    Масив чисел:
  </label>
  <br>
  <input
      type="text"
      id="arrayInput"
      placeholder="12,23,100,34,56"
  />
  <button id="findMax">
    Знайти максимум
  </button>
  <p id="maxResult"></p>
  <hr>
  <h2>5. myDouble() / myTriple()</h2>
  <label>
    Число:
    <input type="number" id="mulInput">
  </label>
  <br><br>
  <button id="doubleBtn">
    Double
  </button>
  <button id="tripleBtn">
    Triple
  </button>
  <p id="mulResult"></p>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
